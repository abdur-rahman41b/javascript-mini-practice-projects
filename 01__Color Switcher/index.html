<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Switcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-div">
    <h1>Color Change</h1>
  </div>

  <div class="middle-div">
    <button class="btn random-color">Random Color</button>
    <input id="colorInput" type="text" placeholder="Enter a color or hex value">
    <button class="btn apply-color">Apply Color</button>
  </div>
  <div class="bottom-div">
    <p>Current Color: <span class="current-color">white</span></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
